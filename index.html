<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ЧМ-2026 — трекер плей-офф</title>
  <link rel="stylesheet" href="src/styles.css?v=live-events1" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">FIFA World Cup 2026</p>
      <h1>Трекер плей-офф</h1>
      <p class="muted">Сетка и счёт обновляются автоматически. Время показано по Тбилиси.</p>
    </div>
  </header>

  <main>
    <section class="homeGrid" id="homeSummary" aria-live="polite"></section>
    <p class="syncLine" id="syncLine"></p>

    <section class="toolbar panel">
      <div class="viewTabs" role="tablist" aria-label="Вид">
        <button id="bracketViewBtn" class="active" type="button">Сетка</button>
        <button id="schemeViewBtn" type="button">Схема</button>
        <button id="scheduleViewBtn" type="button">Расписание</button>
      </div>
      <label>Фильтр
        <select id="statusFilter">
          <option value="all">Все матчи</option>
          <option value="upcoming">Не завершены</option>
          <option value="completed">Завершены</option>
        </select>
      </label>
      <label>Команда
        <select id="teamFilter"><option value="all">Все команды</option></select>
      </label>
    </section>

    <section id="bracket" class="bracket" aria-live="polite"></section>
    <section id="scheme" class="scheme hidden" aria-live="polite"></section>
    <section id="schedule" class="schedule hidden" aria-live="polite"></section>
  </main>

  <dialog id="matchDialog" class="matchDialog">
    <article id="matchDetails" class="matchDetails"></article>
  </dialog>

  <script type="module" src="src/app.js?v=ux-live1"></script>
</body>
</html>
